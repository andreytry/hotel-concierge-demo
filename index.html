<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<title>Ocean Breeze Studios — Concierge</title>
<meta name="description" content="24/7 concierge for Ocean Breeze Studios, Zona Colonial, Santo Domingo. Chat or talk — ask anything, book direct." />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --ocean:#0e6b73; --ocean-deep:#094a50; --foam:#43bdb8; --sand:#f7f0e3; --sand-2:#efe5d2;
    --coral:#e8745b; --ink:#243032; --muted:#6f7d7e; --line:rgba(36,48,50,.12);
    --me:#0e6b73; --bot:#ffffff; --gold:#cf9233;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);background:linear-gradient(170deg,#0c4248,#0e6b73 60%,#0a3a40)}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;background:var(--sand);position:relative;overflow:hidden}
  @media(min-width:600px){.app{border-left:1px solid rgba(0,0,0,.12);border-right:1px solid rgba(0,0,0,.12);box-shadow:0 0 60px rgba(0,0,0,.35)}}
  .hdr{flex:none;background:linear-gradient(180deg,var(--ocean),var(--ocean-deep));color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;display:flex;align-items:center;gap:11px}
  .logo{width:42px;height:42px;border-radius:13px;background:radial-gradient(circle at 30% 25%,#5fd0cb,#0a4d53);display:grid;place-items:center;flex:none;border:1.5px solid rgba(255,255,255,.25);font-size:20px}
  .htext{flex:1;min-width:0}
  .htext .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.1}
  .htext .sub{font-size:11.5px;color:#bfe9e4;display:flex;align-items:center;gap:6px;margin-top:2px}
  .htext .sub::before{content:"";width:7px;height:7px;border-radius:50%;background:#7ff0d2;box-shadow:0 0 0 3px rgba(127,240,210,.3)}
  .lang{display:flex;background:rgba(0,0,0,.22);border-radius:999px;padding:3px;flex:none}
  .lang button{border:0;background:transparent;color:#bfe9e4;font-weight:600;font-size:12px;padding:5px 10px;border-radius:999px;font-family:inherit}
  .lang button.on{background:#fff;color:var(--ocean-deep)}
  .savedbar{flex:none;background:var(--ocean-deep);color:#eafffb;font-size:12px;padding:7px 14px;display:none;align-items:center;justify-content:space-between;gap:8px}
  .savedbar.show{display:flex}
  .savedbar b{color:#ffd98a;font-weight:700}
  .stream{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 13px 8px;display:flex;flex-direction:column;gap:9px;background:radial-gradient(120% 60% at 50% 0%,rgba(67,189,184,.10),transparent 60%),var(--sand)}
  .row{display:flex;max-width:100%}
  .row.me{justify-content:flex-end}
  .bubble{max-width:84%;padding:10px 13px;border-radius:17px;font-size:15px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 1px 1.5px rgba(36,48,50,.08)}
  .bot .bubble{background:var(--bot);color:var(--ink);border-bottom-left-radius:5px}
  .me .bubble{background:var(--me);color:#fff;border-bottom-right-radius:5px}
  .typing .bubble{color:var(--muted);font-style:italic}
  .bubble strong{font-weight:700}
  .bcard{align-self:flex-start;max-width:88%;border:1.5px solid var(--gold);background:linear-gradient(180deg,#fff,#fdf6e7);border-radius:15px;padding:13px;box-shadow:0 4px 14px rgba(207,146,51,.18);animation:pop .35s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .bcard .t{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .bcard .tag{font-size:9.5px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--ocean);padding:3px 7px;border-radius:6px}
  .brow{display:flex;justify-content:space-between;font-size:12.5px;padding:2px 0}
  .brow .l{color:var(--muted)}
  .brow.tot{border-top:1px solid var(--line);margin-top:5px;padding-top:6px;font-weight:700}
  .saved2{margin-top:8px;background:var(--ocean-deep);color:#eafffb;border-radius:8px;padding:7px 10px;font-size:11.5px;display:flex;justify-content:space-between;align-items:center}
  .saved2 b{color:#ffd98a}
  .chips{flex:none;display:flex;gap:7px;padding:8px 12px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;border:1px solid var(--line);background:#fff;color:var(--ocean-deep);font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:999px;font-family:inherit;white-space:nowrap}
  .chip:active{background:var(--sand-2)}
  .composer{flex:none;display:flex;gap:8px;align-items:center;padding:9px 11px calc(env(safe-area-inset-bottom) + 9px);background:var(--sand-2);border-top:1px solid var(--line)}
  .composer input{flex:1;border:1px solid var(--line);border-radius:999px;padding:13px 16px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);outline:none;min-width:0}
  .composer input:focus{border-color:var(--foam)}
  .send{flex:none;border:0;background:var(--ocean);color:#fff;width:48px;height:48px;border-radius:50%;display:grid;place-items:center}
  .send:active{background:var(--ocean-deep)}
  .send:disabled{opacity:.5}
  .vhint{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 76px);z-index:40;display:flex;justify-content:center;pointer-events:none}
  .vhint span{background:rgba(9,74,80,.92);color:#d8fffb;font-size:11px;padding:5px 11px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  a{color:var(--ocean)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">🌊</div>
    <div class="htext">
      <div class="name">Ocean Breeze Studios</div>
      <div class="sub">Zona Colonial · online 24/7 · ES/EN</div>
    </div>
    <div class="lang">
      <button id="les" onclick="setLang('es')">ES</button>
      <button id="len" class="on" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="savedbar" id="savedbar"><span>Booked direct this session</span><b id="savedval">$0 kept off OTA</b></div>
  <div class="stream" id="stream"></div>
  <div class="chips" id="chips"></div>
  <div class="composer">
    <input id="input" autocomplete="off" enterkeyhint="send" placeholder="Type a message…" />
    <button class="send" id="sendBtn" aria-label="Send">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M3.4 20.6 21 12 3.4 3.4l0 6.9L15 12 3.4 13.7z" fill="currentColor"/></svg>
    </button>
  </div>
</div>
<div class="vhint"><span id="vhintTxt">🎙 Tap the mic to talk (voice demo)</span></div>

<elevenlabs-convai agent-id="agent_0301kstp9w36en2rs3bsyamg4p1f"></elevenlabs-convai>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

<script>
const WEBHOOK="https://ai-process.app.n8n.cloud/webhook/concierge";
const HOTEL_WA="+18096850193";
const GUEST="web-"+Math.random().toString(36).slice(2,9);
const ROOMS=[{type:"Basic Studio",rate:39},{type:"Deluxe Studio",rate:45},{type:"Luxe Studio",rate:49}];
const DISCOUNT=10, OTA=15;
let lang="en", saved=0;
const seen=new Set();
const GREET={
  en:"Hi! 👋 Welcome to Ocean Breeze Studios in the Zona Colonial. Ask me anything — rooms, prices, parking, where we are — or tell me your dates and I'll book you in. You can also tap the mic to talk.",
  es:"¡Hola! 👋 Bienvenido a Ocean Breeze Studios en la Zona Colonial. Pregúntame lo que quieras —habitaciones, precios, parqueo, ubicación— o dime tus fechas y te reservo. También puedes tocar el micrófono para hablar."
};
const CHIPS={
  en:["Room types & prices","Is there parking?","Where are you located?","Book a Deluxe, 2 nights"],
  es:["Tipos y precios","¿Hay parqueo?","¿Dónde están ubicados?","Reservar Deluxe, 2 noches"]
};
const stream=document.getElementById('stream'), chipsEl=document.getElementById('chips'), input=document.getElementById('input');
function setLang(l){lang=l;document.getElementById('les').classList.toggle('on',l==='es');document.getElementById('len').classList.toggle('on',l==='en');
  input.placeholder=l==='es'?"Escribe un mensaje…":"Type a message…";
  document.getElementById('vhintTxt').textContent=l==='es'?"🎙 Toca el micrófono para hablar (voz demo)":"🎙 Tap the mic to talk (voice demo)";
  renderChips();}
function renderChips(){chipsEl.innerHTML='';CHIPS[lang].forEach(c=>{const b=document.createElement('button');b.className='chip';b.textContent=c;b.onclick=()=>{input.value=c;send();};chipsEl.appendChild(b);});}
function mdBold(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}
function addBubble(role,text){const r=document.createElement('div');r.className='row '+(role==='me'?'me':'bot');const b=document.createElement('div');b.className='bubble';b.innerHTML=role==='me'?text.replace(/</g,'&lt;'):mdBold(text.replace(/</g,'&lt;'));r.appendChild(b);stream.appendChild(r);stream.scrollTop=stream.scrollHeight;return r;}
function fmt(d){if(!d)return"—";try{return new Date(d+"T00:00:00").toLocaleDateString(undefined,{month:'short',day:'numeric'});}catch(e){return d;}}
function showBooking(o){
  const nights=Number(o.nights)||1;
  const room=ROOMS.find(r=>r.type===o.room_type)||{rate:Math.round((Number(o.quoted_usd)/Math.max(nights,1))/(1-DISCOUNT/100))||0};
  const gross=Math.round(room.rate*nights);
  const net=Math.round(Number(o.quoted_usd)||gross*(1-DISCOUNT/100));
  const otaSave=Math.round(net*OTA/100);
  const c=document.createElement('div');c.className='bcard';
  c.innerHTML='<div class="t"><span>'+(o.guest_name||'Guest')+' · '+(o.room_type||'Studio')+'</span><span class="tag">DIRECT</span></div>'+
    '<div class="brow"><span class="l">Dates</span><span>'+fmt(o.checkin)+' → '+fmt(o.checkout)+' · '+nights+'n</span></div>'+
    '<div class="brow"><span class="l">Guests</span><span>'+(o.guests||'—')+'</span></div>'+
    '<div class="brow"><span class="l">Rate × nights</span><span>$'+room.rate+' × '+nights+' = $'+gross+'</span></div>'+
    '<div class="brow tot"><span>Direct total (−'+DISCOUNT+'%)</span><span>$'+net+'</span></div>'+
    '<div class="saved2"><span>Kept off Booking.com (~'+OTA+'%)</span><b>+$'+otaSave+'</b></div>';
  stream.appendChild(c);stream.scrollTop=stream.scrollHeight;
  saved+=otaSave;
  document.getElementById('savedbar').classList.add('show');
  document.getElementById('savedval').textContent='$'+saved.toLocaleString()+' kept off OTA';
}
async function send(){
  const text=input.value.trim();if(!text)return;input.value='';
  addBubble('me',text);
  const btn=document.getElementById('sendBtn');btn.disabled=true;
  const typing=addBubble('bot',lang==='es'?'escribiendo…':'typing…');typing.classList.add('typing');
  try{
    const res=await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({From:GUEST,To:HOTEL_WA,Body:text})});
    const o=await res.json();
    typing.remove();
    addBubble('bot',o.reply||(lang==='es'?'(sin respuesta)':'(no reply)'));
    if(o.booking_ready){const k=[o.room_type,o.checkin,o.checkout,o.guests].join('|');if(!seen.has(k)){seen.add(k);showBooking(o);}}
  }catch(e){
    typing.remove();
    addBubble('bot',lang==='es'?'Ups — no pude conectar. Inténtalo de nuevo.':'Hmm — could not connect. Please try again.');
  }finally{btn.disabled=false;input.focus();}
}
document.getElementById('sendBtn').onclick=send;
input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
setLang('en');
addBubble('bot',GREET.en);
</script>
</body>
</html>
