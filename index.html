<!DOCTYPE html>

tailwind.config={theme:{extend:{

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  .hero-img{background:#0a4d53 url('https://lh3.googleusercontent.com/sitesv/AA5AbUBn8rAMCLaRUYUWZ59yg8VyvG6jJlPqJSZHjF8Wc6GYE_wwz-k-oO71Hg5Yw94GDlDzeP4Jc20UG8byPXgqtSy1O_a9KA710wMXI-4Lz2YEL70RwQZHCBYHD-n31BfYtTMudiCwcvoiA2iBZTfJ0_lLwXApnSw6eD75Hwq3bFwlaaJ5scf3PQy1_gzq4fI8y5Llz86R668gsD6ASlKcHw4MxnejwzmnPwzLwGsj=w1280') center/cover no-repeat}

<body>

<!-- ElevenLabs voice widget (advanced). NOTE: HVAC agent as placeholder until an Ocean Breeze agent exists -->

<script type="text/babel">
const {useState,useRef,useEffect}=React;
const CHAT="https://ai-process.app.n8n.cloud/webhook/concierge";
const REGISTER="https://ai-process.app.n8n.cloud/webhook/concierge-register";
const HOTEL_WA="+18096850193";
const WA_LINK="https://wa.me/18096850193?text="+encodeURIComponent("Hola Ocean Breeze, quisiera informacion / I'd like info");
const GUEST="web-"+Math.random().toString(36).slice(2,9);

const ROOMS=[
  {name:"Basic Studio",price:39,desc:"Estudio acogedor con cocina privada, A/C y WiFi. Ideal para viajar ligero."},
  {name:"Deluxe Studio",price:45,desc:"Mas espacio y luz, algunos con balcon. Tu base comoda en la Zona Colonial.",feat:true},
  {name:"Luxe Studio",price:49,desc:"Nuestro estudio mas amplio, con los mejores acabados y terraza cercana."}
];
const AMEN=[["📶","WiFi gratis"],["❄️","Aire acondicionado"],["🍳","Cocina privada"],["🛁","Baño privado"],["📺","TV con cable"],["🌅","Terraza en la azotea"],["🕛","Recepcion 24/7"],["🗝️","Check-in flexible"]];

function Nav(){
  return (
    <nav className="fixed top-0 inset-x-0 z-40 backdrop-blur bg-sand-50/80 border-b border-black/5">
      <div className="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
        <a href="#top" className="font-display text-xl font-600 text-ocean-800 tracking-tight">Ocean Breeze <span className="text-ocean-500">Studios</span></a>
        <div className="hidden sm:flex items-center gap-7 text-sm font-500 text-ocean-900/70">
          <a href="#rooms" className="hover:text-ocean-600">Estudios</a>
          <a href="#amenities" className="hover:text-ocean-600">Servicios</a>
          <a href="#location" className="hover:text-ocean-600">Ubicacion</a>
        </div>
        <a href="#checkin" className="bg-ocean-700 hover:bg-ocean-800 text-white text-sm font-600 px-5 py-2.5 rounded-full transition">Registrarse</a>
      </div>
    </nav>
  );
}

function Hero(){
  return (
    <header id="top" className="relative hero-img min-h-[88vh] flex items-end">
      <div className="absolute inset-0 bg-gradient-to-t from-ocean-900/90 via-ocean-900/45 to-ocean-900/30"></div>
      <div className="relative max-w-6xl mx-auto px-5 pb-16 pt-32 w-full text-white fade-up">
        <span className="inline-flex items-center gap-2 text-[11px] tracking-[.2em] uppercase font-700 bg-white/15 border border-white/25 rounded-full px-3 py-1.5">
          <span className="w-1.5 h-1.5 rounded-full bg-ocean-300"></span>Zona Colonial · Santo Domingo
        </span>
        <h1 className="font-display font-600 leading-[1.02] tracking-tight mt-5 text-[42px] sm:text-6xl max-w-3xl">
          Tu hogar lejos de casa, en el corazon de la historia.
        </h1>
        <p className="mt-5 max-w-xl text-white/80 text-lg">Estudios boutique a metros de El Conde y Parque Independencia. Cocina propia, recepcion 24/7 y reserva directa con el mejor precio.</p>
        <div className="mt-8 flex flex-wrap gap-3">
          <a href="#checkin" className="bg-white text-ocean-800 font-700 px-7 py-3.5 rounded-full hover:translate-y-[-2px] transition shadow-soft">Reservar directo · desde $39</a>
          <a href="#rooms" className="border border-white/40 text-white font-600 px-7 py-3.5 rounded-full hover:bg-white/10 transition">Ver estudios</a>
        </div>
      </div>
    </header>
  );
}

function Rooms(){
  return (
    <section id="rooms" className="max-w-6xl mx-auto px-5 py-20">
      <p className="text-ocean-600 text-xs font-700 tracking-[.25em] uppercase">Nuestros estudios</p>
      <h2 className="font-display text-4xl font-600 text-ocean-900 mt-3">Elige tu espacio</h2>
      <p className="text-ocean-900/60 mt-3 max-w-lg">Cada estudio incluye cocina privada, A/C y WiFi. Reserva directa con <b className="text-ocean-700">10% de descuento</b> frente a las OTAs.</p>
      <div className="grid sm:grid-cols-3 gap-6 mt-10">
        {ROOMS.map(r=>(
          <div key={r.name} className={"rounded-3xl p-7 border transition hover:-translate-y-1 "+(r.feat?"bg-ocean-700 text-white border-ocean-700 shadow-soft":"bg-white border-black/5 shadow-soft")}>
            {r.feat&&<span className="text-[10px] font-700 tracking-widest uppercase bg-gold text-ocean-900 px-2.5 py-1 rounded-full">Mas popular</span>}
            <h3 className={"font-display text-2xl font-600 mt-3 "+(r.feat?"text-white":"text-ocean-900")}>{r.name}</h3>
            <p className={"text-sm mt-2 "+(r.feat?"text-white/80":"text-ocean-900/60")}>{r.desc}</p>
            <div className="mt-6 flex items-end gap-1">
              <span className={"font-display text-4xl font-700 "+(r.feat?"text-white":"text-ocean-700")}>${r.price}</span>
              <span className={"text-sm mb-1 "+(r.feat?"text-white/70":"text-ocean-900/50")}>/ noche</span>
            </div>
            <a href="#checkin" className={"mt-5 block text-center font-600 py-3 rounded-full transition "+(r.feat?"bg-white text-ocean-800 hover:bg-sand-100":"bg-ocean-700 text-white hover:bg-ocean-800")}>Reservar</a>
          </div>
        ))}
      </div>
    </section>
  );
}

function Amenities(){
  return (
    <section id="amenities" className="bg-white border-y border-black/5">
      <div className="max-w-6xl mx-auto px-5 py-20">
        <p className="text-ocean-600 text-xs font-700 tracking-[.25em] uppercase">Servicios</p>
        <h2 className="font-display text-4xl font-600 text-ocean-900 mt-3">Todo lo que necesitas</h2>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-10">
          {AMEN.map(([i,t])=>(
            <div key={t} className="rounded-2xl bg-sand-50 border border-black/5 p-6 text-center hover:bg-sand-100 transition">
              <div className="text-3xl">{i}</div>
              <div className="mt-2 font-600 text-ocean-900 text-sm">{t}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Location(){
  return (
    <section id="location" className="max-w-6xl mx-auto px-5 py-20 grid md:grid-cols-2 gap-10 items-center">
      <div>
        <p className="text-ocean-600 text-xs font-700 tracking-[.25em] uppercase">Ubicacion</p>
        <h2 className="font-display text-4xl font-600 text-ocean-900 mt-3">A metros de todo</h2>
        <p className="text-ocean-900/65 mt-4 leading-relaxed">Estamos en Calle Palo Hincado 202, esq. Calle Canela — a ~100m de Parque Independencia y la calle El Conde, cerca de Parque Colon y la Plaza Espana. El aeropuerto Las Americas (SDQ) esta a ~25 minutos en auto.</p>
        <ul className="mt-5 space-y-2 text-ocean-900/75 text-sm">
          <li>📍 Calle Palo Hincado 202, Zona Colonial, Santo Domingo</li>
          <li>📞 WhatsApp / Tel: (809) 685-0193</li>
          <li>✉️ oceanbreezestudios@gmail.com</li>
        </ul>
      </div>
      <div className="rounded-3xl overflow-hidden shadow-soft border border-black/5 h-72 md:h-80">
        <iframe title="map" className="w-full h-full" loading="lazy"
          src="https://maps.google.com/maps?q=18.470376,-69.890885&z=16&output=embed"></iframe>
      </div>
    </section>
  );
}

function CheckIn(){
  const [f,setF]=useState({full_name:"",email:"",phone:"",checkin:"",checkout:"",guests:"2",room_pref:"Deluxe Studio"});
  const [state,setState]=useState("idle");
  const set=(k)=>(e)=>setF({...f,[k]:e.target.value});
  async function submit(e){
    e.preventDefault();
    if(!f.full_name||!f.email){return;}
    setState("sending");
    try{
      await fetch(REGISTER,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(f)});
      setState("done");
    }catch(err){setState("error");}
  }
  if(state==="done"){
    return (
      <section id="checkin" className="bg-ocean-800">
        <div className="max-w-3xl mx-auto px-5 py-24 text-center text-white fade-up">
          <div className="text-5xl">🌊</div>
          <h2 className="font-display text-4xl font-600 mt-4">¡Gracias, {f.full_name.split(" ")[0]}!</h2>
          <p className="text-white/80 mt-3 max-w-lg mx-auto">Te enviamos un correo de bienvenida con tu oferta de reserva directa. Responde con tus fechas y te confirmamos al mejor precio.</p>
          <a href={WA_LINK} target="_blank" className="inline-block mt-7 bg-[#25D366] text-white font-700 px-7 py-3.5 rounded-full">Escribenos por WhatsApp</a>
        </div>
      </section>
    );
  }
  return (
    <section id="checkin" className="bg-ocean-800">
      <div className="max-w-5xl mx-auto px-5 py-20 grid md:grid-cols-2 gap-10 items-center">
        <div className="text-white">
          <p className="text-ocean-300 text-xs font-700 tracking-[.25em] uppercase">Registro / Check-in</p>
          <h2 className="font-display text-4xl font-600 mt-3">Registrate y reserva directo</h2>
          <p className="text-white/75 mt-4 leading-relaxed">Deja tus datos y te enviamos una oferta de reserva directa con <b>10% de descuento</b> y check-in flexible 24/7. Sin comisiones de OTA.</p>
          <div className="mt-6 flex items-center gap-3 text-white/70 text-sm">
            <span className="w-9 h-9 rounded-full bg-white/10 grid place-items-center">✓</span>
            Confirmacion por correo · respuesta rapida
          </div>
        </div>
        <form onSubmit={submit} className="bg-white rounded-3xl p-7 shadow-soft space-y-3">
          <input required value={f.full_name} onChange={set("full_name")} placeholder="Nombre completo" className="w-full rounded-xl border border-black/10 px-4 py-3 outline-none focus:border-ocean-500"/>
          <input required type="email" value={f.email} onChange={set("email")} placeholder="Correo electronico" className="w-full rounded-xl border border-black/10 px-4 py-3 outline-none focus:border-ocean-500"/>
          <input value={f.phone} onChange={set("phone")} placeholder="WhatsApp / telefono" className="w-full rounded-xl border border-black/10 px-4 py-3 outline-none focus:border-ocean-500"/>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs text-ocean-900/50 font-600">Entrada</label><input type="date" value={f.checkin} onChange={set("checkin")} className="w-full rounded-xl border border-black/10 px-3 py-2.5 outline-none focus:border-ocean-500"/></div>
            <div><label className="text-xs text-ocean-900/50 font-600">Salida</label><input type="date" value={f.checkout} onChange={set("checkout")} className="w-full rounded-xl border border-black/10 px-3 py-2.5 outline-none focus:border-ocean-500"/></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <select value={f.guests} onChange={set("guests")} className="rounded-xl border border-black/10 px-3 py-3 outline-none focus:border-ocean-500">
              <option value="1">1 huesped</option><option value="2">2 huespedes</option><option value="3">3 huespedes</option>
            </select>
            <select value={f.room_pref} onChange={set("room_pref")} className="rounded-xl border border-black/10 px-3 py-3 outline-none focus:border-ocean-500">
              <option>Basic Studio</option><option>Deluxe Studio</option><option>Luxe Studio</option>
            </select>
          </div>
          <button disabled={state==="sending"} className="w-full bg-ocean-700 hover:bg-ocean-800 disabled:opacity-60 text-white font-700 py-3.5 rounded-full transition">
            {state==="sending"?"Enviando…":"Registrarme y recibir oferta"}
          </button>
          {state==="error"&&<p className="text-coral text-sm text-center">No se pudo enviar. Intenta de nuevo.</p>}
        </form>
      </div>
    </section>
  );
}

function Footer(){
  return (
    <footer className="bg-ocean-900 text-white/70">
      <div className="max-w-6xl mx-auto px-5 py-14 grid sm:grid-cols-3 gap-8">
        <div>
          <div className="font-display text-xl text-white font-600">Ocean Breeze Studios</div>
          <p className="text-sm mt-3">Tu hogar lejos de casa en la Zona Colonial de Santo Domingo.</p>
        </div>
        <div className="text-sm space-y-1.5">
          <div className="text-white font-600 mb-2">Contacto</div>
          <div>Calle Palo Hincado 202, Zona Colonial</div>
          <div>WhatsApp / Tel: (809) 685-0193</div>
          <div>oceanbreezestudios@gmail.com</div>
        </div>
        <div className="text-sm space-y-1.5">
          <div className="text-white font-600 mb-2">Reserva</div>
          <a href="#checkin" className="block hover:text-white">Registro / Check-in</a>
          <a href="#rooms" className="block hover:text-white">Estudios y precios</a>
          <a href={WA_LINK} target="_blank" className="block hover:text-white">WhatsApp directo</a>
        </div>
      </div>
      <div className="border-t border-white/10 text-center text-xs py-5">© 2026 Ocean Breeze Studios · Reserva directa, sin comisiones</div>
    </footer>
  );
}

/* ---- Text chatbot chip ---- */
function ChatWidget(){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{role:"bot",text:"¡Hola! 🌊 Soy el concierge de Ocean Breeze. Preguntame por estudios, precios, parqueo o ubicacion."}]);
  const [val,setVal]=useState("");const [busy,setBusy]=useState(false);
  const end=useRef(null);
  useEffect(()=>{end.current&&end.current.scrollIntoView({behavior:"smooth"});},[msgs,open]);
  async function send(){
    const t=val.trim();if(!t||busy)return;setVal("");
    setMsgs(m=>[...m,{role:"me",text:t}]);setBusy(true);
    setMsgs(m=>[...m,{role:"bot",text:"…",typing:true}]);
    try{
      const r=await fetch(CHAT,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({From:GUEST,To:HOTEL_WA,Body:t})});
      const o=await r.json();
      setMsgs(m=>[...m.filter(x=>!x.typing),{role:"bot",text:o.reply||"…"}]);
    }catch(e){setMsgs(m=>[...m.filter(x=>!x.typing),{role:"bot",text:"No pude conectar. Intenta de nuevo."}]);}
    finally{setBusy(false);}
  }
  return (
    <div>
      {open&&(
        <div className="fixed z-50 bottom-24 right-4 w-[min(92vw,360px)] h-[min(70vh,520px)] bg-white rounded-3xl shadow-soft border border-black/10 flex flex-col overflow-hidden fade-up">
          <div className="bg-ocean-700 text-white px-4 py-3 flex items-center gap-3">
            <div className="w-9 h-9 rounded-full bg-ocean-500 grid place-items-center">🌊</div>
            <div className="flex-1"><div className="font-600 text-sm">Concierge · Chat</div><div className="text-[11px] text-ocean-100">Ocean Breeze Studios</div></div>
            <button onClick={()=>setOpen(false)} className="text-white/80 text-xl leading-none">×</button>
          </div>
          <div className="flex-1 overflow-y-auto p-3 space-y-2 bg-sand-50">
            {msgs.map((m,i)=>(
              <div key={i} className={"flex "+(m.role==="me"?"justify-end":"")}>
                <div className={"max-w-[84%] px-3.5 py-2 rounded-2xl text-[14px] leading-snug "+(m.role==="me"?"bg-ocean-700 text-white rounded-br-sm":"bg-white border border-black/5 text-ocean-900 rounded-bl-sm "+(m.typing?"italic text-ocean-900/50":""))}>{m.text}</div>
              </div>
            ))}
            <div ref={end}></div>
          </div>
          <div className="p-2.5 border-t border-black/10 flex gap-2 bg-white">
            <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Escribe un mensaje…" className="flex-1 rounded-full border border-black/10 px-4 py-2.5 text-sm outline-none focus:border-ocean-500"/>
            <button onClick={send} disabled={busy} className="w-10 h-10 rounded-full bg-ocean-700 text-white grid place-items-center disabled:opacity-50">➤</button>
          </div>
        </div>
      )}
      <button onClick={()=>setOpen(!open)} className="fixed z-50 bottom-24 right-4 bg-ocean-700 hover:bg-ocean-800 text-white rounded-full shadow-soft w-14 h-14 grid place-items-center text-2xl transition" title="Chat con el concierge">
        {open?"×":"💬"}
      </button>
      <span className="fixed z-40 bottom-[152px] right-4 text-[10px] bg-ocean-900/85 text-ocean-100 px-2 py-0.5 rounded-full pointer-events-none">Chat</span>
    </div>
  );
}

function WhatsAppBtn(){
  return (
    <a href={WA_LINK} target="_blank" className="fixed z-50 bottom-6 left-4 bg-[#25D366] hover:scale-105 transition text-white rounded-full shadow-soft w-14 h-14 grid place-items-center" title="WhatsApp">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.207zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
    </a>
  );
}

function App(){
  return (<div>
    <Nav/><Hero/><Rooms/><Amenities/><Location/><CheckIn/><Footer/>
    <ChatWidget/><WhatsAppBtn/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
